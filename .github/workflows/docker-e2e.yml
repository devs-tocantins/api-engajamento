name: NestJS API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
- name: Prepare environment variables
  run: |
    cp env-example-relational .env
    echo "FILE_DRIVER=LOCAL" >> .env
    echo "MAIL_HOST=localhost" >> .env
    echo "MAIL_PORT=1025" >> .env
    echo "MAIL_USER=mock" >> .env
    echo "MAIL_PASSWORD=mock" >> .env
    echo "MAIL_DEFAULT_EMAIL=mock@example.com" >> .env
    echo "MAIL_DEFAULT_NAME=Mock" >> .env
    echo "MAIL_IGNORE_TLS=true" >> .env
    echo "MAIL_SECURE=false" >> .env
    echo "MAIL_REQUIRE_TLS=false" >> .env
      # <database-relational-block>
      - name: Run e2e tests for NestJS with TypeORM
        id: relational
        run: docker compose -f docker-compose.relational.ci.yaml --env-file .env -p ci-relational up --build --exit-code-from api

      - name: Copy prod.log from container to host
        if: ${{ failure() && steps.relational.conclusion == 'failure' }}
        run: docker cp ci-relational-api-1:/usr/src/app/prod.log .
      # </database-relational-block>

      

      - name: Upload prod.log to artifacts for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-logs
          path: prod.log
